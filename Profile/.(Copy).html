<html>
 <head>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <style>
   @import url('https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i');
   {
    margin:0;
    padding:0;
    box-sizing:border-box;
   }
   body{
    display: flex;
    justify-content: center ;
    align-items: center;
    min-height: 90vh;
    background: linear-gradient(45deg,#fbda61,#ff5acd);
   }
   .card{
    position: relative;
    height: 190px;
    width: 390px;
    background: white;
    border-radius:20px ;
    box-shadow: 0 35px 80px rgba(0,0,0,0.15);
    transition: 0.5s;
   }
   .card:hover{
    height: 450px;
   }
   .imgBx{
    position: absolute;
    left: 50%;
    top: -50px;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0px 15px 50px rgba(0,0,0,0.55);
    overflow: hidden;
    transition: 0.5s;
   }
   .card:hover .imgBx{
    width: 200px;
    height: 200px;
   }
   .imgBx img{
    position: absolute;
    top: 0;
    left:0;
    width:100%;
    height: 100%;
    border-radius: 20px;
    object-fit: cover;
   }
   .card .contents{
    position: absolute;
    width:100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    overflow: hidden;
   }
   .card .contents .details{
    padding: 40px;
    text-align: center;
    width: 100%;
    transition: 0.5s;
    transform: translateY(150px);
    transition: 0.5s;
   }
  .card:hover .contents .details{
   transform: translateY(-20px);
  }
   .card .contents .details h2{
    font-size: 1.25em;
    font-weight: 600;
    color:#555;
    line-height: 1.2em;
   }
  .card .contents .details h2 span{
   font-size: 0.7em;
   font-weight:500 ;
   opacity: 0.5;
  }
  .card .contents .details .data{
   display: flex;
   justify-content: space-between;
   margin: 20px 0;
  }
  .card .contents .details .data h3{
   font-size: 1em;
   color:#555;
   line-height: 1.25em;
   font-weight: 600;
  }
  .card .contents .details .data h3 span{
   font-size: 0.8em;
   font-weight: 400;
   opacity:0.5;
  }
  .card .contents .details .actionBtn{
   display: flex;
   justify-content: space-between;
   /*gap: 20px;*/
  }
  .card .contents .details .actionBtn button{
   padding: 10px 30px;
   border-radius: 5px;
   border: none;
   outline: none;
   font-size: 1em;
   font-weight: 600;
   background:  #ff5f95;
   color: #fff;
   cursor: pointer;
  }
  .card .contents .details .actionBtn button:nth-child(2){
   border: 1px solid #999;
   color: #999;
   background: #fff;
   
  }
  </style>
 </head>
 <body>
  <div class="card">
<div class="imgBx">
 <img src="profile.jpg">
</div>
<div class="contents">
 <div class="details">
  <h2>Alina smith<br>
  <span>programer/technical</span>
  </h2>
  <div class="data">
   <h3>234<span>post</span></h3>
   <h3>234<span>post</span></h3>
   <h3>234<span>post</span></h3>
  </div>
  <div class="actionBtn">
   <button>follow</button>
   <button>komentar</button>
  </div>
 </div>
</div>
  </div>
 </body>
</html>
